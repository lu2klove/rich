<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>투자OS</title><link rel="stylesheet" href="style.css"></head><body><h1>📈 투자OS</h1><div class="menu"><button onclick="show('buy')">매수</button><button onclick="show('sell')">매도</button><button onclick="show('portfolio')">포트</button></div><div id="buy" class="card"><h2>매수</h2><input id="bname" placeholder="종목명"><input id="bprice" placeholder="매수가"><input id="bqty" placeholder="수량"><textarea id="breason" placeholder="투자이유"></textarea><button onclick="saveBuy()">저장</button></div><div id="sell" class="card" style="display:none"><h2>매도</h2><input id="sname" placeholder="종목명"><textarea id="sreason" placeholder="매도사유"></textarea><button onclick="saveSell()">저장</button></div><div id="portfolio" class="card" style="display:none"><h2>기록</h2><pre id="out"></pre></div><script src="app.js"></script></body></html>
